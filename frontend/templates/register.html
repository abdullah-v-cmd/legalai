{% extends "base.html" %}
{% block title %}Register - LegalAI{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary via-primary-light to-blue-900 p-4">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 right-20 w-64 h-64 bg-gold/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 left-20 w-96 h-96 bg-blue-400/10 rounded-full blur-3xl"></div>
    </div>
    
    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-3">
                <div class="w-14 h-14 bg-white/10 backdrop-blur rounded-2xl flex items-center justify-center border border-white/20">
                    <i class="fas fa-gavel text-white text-2xl"></i>
                </div>
                <span class="text-3xl font-bold text-white font-serif">LegalAI</span>
            </a>
            <p class="text-blue-200 mt-2">Create your free account today</p>
        </div>
        
        <div class="glass rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create Account</h2>
            
            <form id="register-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Username *</label>
                        <input type="text" id="username" placeholder="johndoe" minlength="3"
                            class="w-full px-3 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition bg-gray-50 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="full_name" placeholder="John Doe"
                            class="w-full px-3 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition bg-gray-50 text-sm">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Email *</label>
                    <input type="email" id="email" placeholder="john@example.com"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition bg-gray-50 text-sm" required>
                </div>
                
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Password *</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Min 8 chars, uppercase, digit"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition bg-gray-50 text-sm pr-12" required>
                        <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fas fa-eye" id="password-toggle-icon"></i>
                        </button>
                    </div>
                    <!-- Password strength indicator -->
                    <div class="mt-2 flex gap-1">
                        <div class="h-1 flex-1 rounded-full bg-gray-200" id="strength-1"></div>
                        <div class="h-1 flex-1 rounded-full bg-gray-200" id="strength-2"></div>
                        <div class="h-1 flex-1 rounded-full bg-gray-200" id="strength-3"></div>
                        <div class="h-1 flex-1 rounded-full bg-gray-200" id="strength-4"></div>
                    </div>
                    <p class="text-xs text-gray-400 mt-1" id="strength-text">Password strength</p>
                </div>
                
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Confirm Password *</label>
                    <input type="password" id="confirm_password" placeholder="Repeat password"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition bg-gray-50 text-sm" required>
                </div>
                
                <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl p-3 text-sm">
                    <i class="fas fa-exclamation-circle mr-1"></i><span id="error-text"></span>
                </div>
                
                <div class="flex items-start gap-2">
                    <input type="checkbox" id="terms" class="mt-1" required>
                    <label for="terms" class="text-xs text-gray-600">
                        I agree to the Terms of Service. This is for educational purposes only, not professional legal advice.
                    </label>
                </div>
                
                <button type="submit" id="register-btn"
                    class="w-full btn-primary text-white py-3 rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg">
                    <i class="fas fa-user-plus"></i><span>Create Account</span>
                </button>
            </form>
            
            <div class="mt-5 text-center">
                <p class="text-gray-600 text-sm">Already have an account? 
                    <a href="/login" class="text-primary font-semibold hover:underline">Sign in</a>
                </p>
            </div>
        </div>
        <p class="text-center text-blue-200/70 text-sm mt-6">
            <a href="/" class="hover:text-white transition"><i class="fas fa-arrow-left mr-1"></i>Back to Home</a>
        </p>
    </div>
</div>

<script>
if (AUTH.isLoggedIn()) window.location.href = '/chat';

function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById(`${id}-toggle-icon`);
    if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
    else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
}

// Password strength checker
document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[a-z]/.test(val)) score++;
    if (/\d/.test(val)) score++;
    
    const colors = ['', 'bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-500'];
    const texts = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const textColors = ['', 'text-red-500', 'text-orange-500', 'text-yellow-600', 'text-green-600'];
    
    for (let i = 1; i <= 4; i++) {
        const el = document.getElementById(`strength-${i}`);
        el.className = `h-1 flex-1 rounded-full ${i <= score ? colors[score] : 'bg-gray-200'}`;
    }
    document.getElementById('strength-text').textContent = texts[score] || 'Too short';
    document.getElementById('strength-text').className = `text-xs mt-1 ${textColors[score] || 'text-gray-400'}`;
});

document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    const errorDiv = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');
    
    const password = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    
    if (password !== confirmPass) {
        errorText.textContent = 'Passwords do not match';
        errorDiv.classList.remove('hidden');
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner w-5 h-5 border-2 border-white/30 border-t-white"></div> Creating account...';
    errorDiv.classList.add('hidden');
    
    try {
        const result = await API.post('/api/auth/register', {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password,
            full_name: document.getElementById('full_name').value,
        });
        
        if (result.ok) {
            showToast('Account created successfully! Please login.', 'success');
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            errorText.textContent = result.data.detail || 'Registration failed';
            errorDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i><span>Create Account</span>';
        }
    } catch (err) {
        errorText.textContent = 'Connection error. Please try again.';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i><span>Create Account</span>';
    }
});
</script>
{% endblock %}
